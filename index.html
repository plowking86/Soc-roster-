<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#23352d" />
  <title>Jessica Mazza Roster</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">DLRSOC roster</p>
      <h1>Jessica Mazza</h1>
      <p id="rangeText" class="sub"></p>
    </div>
    <button id="installBtn" class="ghost" hidden>Install app</button>
  </header>

  <main>
    <section class="cards" id="stats"></section>

    <section class="panel controls">
      <button id="prevMonth">‹</button>
      <h2 id="monthLabel"></h2>
      <button id="nextMonth">›</button>
      <button id="todayBtn" class="secondary">Today</button>
      <input id="searchBox" type="search" placeholder="Search date, shift, BO, EDO…" />
    </section>

    <section class="panel">
      <div class="legend">
        <span><b class="dot early"></b>Early</span>
        <span><b class="dot day"></b>Day</span>
        <span><b class="dot late"></b>Late/Night</span>
        <span><b class="dot off"></b>BO/EDO</span>
        <span><b class="dot swap"></b>Saved note/swap</span>
      </div>
      <div class="weekdays"><span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span></div>
      <div id="calendar" class="calendar"></div>
    </section>

    <section class="panel split">
      <div>
        <h2>Selected day</h2>
        <div id="selectedDay" class="selected">Tap a date to add a note or swap.</div>
      </div>
      <div>
        <h2>Search / list</h2>
        <div id="list" class="list"></div>
      </div>
    </section>
  </main>

  <dialog id="editDialog">
    <form method="dialog">
      <h2 id="dialogTitle">Edit day</h2>
      <label>Rostered shift
        <input id="editShift" readonly />
      </label>
      <label>Swap / note
        <input id="editNote" placeholder="Example: swapped with Brad, start 12:00" />
      </label>
      <menu>
        <button value="cancel">Cancel</button>
        <button id="clearNote" value="clear" class="danger">Clear</button>
        <button id="saveNote" value="save" class="primary">Save</button>
      </menu>
    </form>
  </dialog>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
