<html lang="en-AU">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#7c3aed">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Jess Roster">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Jess Roster</title>
<style>
:root {
  --bg:#f6f3fa; --card:#fff; --ink:#11131a; --muted:#6b7280; --line:#e5e7eb;
  --purple:#7c3aed; --pink:#db2777; --off:#f3f4f6;
}
* { box-sizing:border-box; }
body { margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; }
header { padding:56px 28px 34px; color:white; background:linear-gradient(135deg,var(--purple),var(--pink)); }
h1 { margin:0; font-size:44px; letter-spacing:-1px; }
header p { margin:10px 0 0; font-size:18px; opacity:.9; font-weight:700; }
main { padding:18px; max-width:920px; margin:auto; }
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
.card { background:var(--card); border:1px solid var(--line); border-radius:22px; padding:18px; box-shadow:0 2px 10px #00000012; }
.label { color:var(--muted); font-weight:800; font-size:17px; }
.big { font-size:34px; font-weight:900; margin-top:8px; }
input, button, select, textarea { font:inherit; }
.search { width:100%; padding:17px 18px; border:1px solid var(--line); border-radius:18px; font-size:20px; margin:16px 0; }
.datebar { display:flex; gap:10px; align-items:center; }
.datebar input { flex:1; padding:16px; border-radius:18px; border:1px solid var(--line); text-align:center; font-size:18px; }
button { border:0; border-radius:18px; padding:16px 18px; font-weight:900; background:#111827; color:white; cursor:pointer; }
.tabs { display:flex; gap:10px; overflow:auto; margin:16px 0; padding-bottom:4px; }
.tabs button { white-space:nowrap; background:white; color:#111827; border:1px solid var(--line); box-shadow:0 2px 8px #0000000d; }
.tabs button.active { background:var(--purple); color:white; }
.rows { display:grid; gap:10px; }
.row { display:grid; grid-template-columns:110px 1fr 88px; gap:12px; align-items:center; padding:14px; border:1px solid var(--line); border-radius:18px; background:white; }
.row .d { font-weight:900; }
.row .w { color:var(--muted); font-weight:700; }
.pill { justify-self:end; min-width:76px; text-align:center; border-radius:999px; padding:9px 12px; font-weight:900; background:#eef2ff; }
.pill.off { background:#f3f4f6; color:#374151; }
.pill.day { background:#ccfbf1; color:#115e59; }
.pill.night { background:#e0e7ff; color:#312e81; }
.pill.leave { background:#fef3c7; color:#92400e; }
.pill.edo { background:#dbeafe; color:#1d4ed8; }
.monthHead { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.monthHead h2 { margin:0; font-size:24px; }
.monthGrid { display:grid; grid-template-columns:repeat(7,1fr); gap:7px; }
.dow { text-align:center; font-size:13px; font-weight:900; color:var(--muted); }
.daycell { min-height:78px; background:white; border:1px solid var(--line); border-radius:14px; padding:8px; }
.daycell.other { opacity:.35; }
.daycell.today { outline:3px solid var(--purple); }
.num { font-weight:900; }
.shift { margin-top:6px; display:inline-block; font-weight:900; font-size:13px; border-radius:999px; padding:5px 7px; background:#eef2ff; }
textarea { width:100%; border:1px solid var(--line); border-radius:14px; padding:12px; min-height:90px; }
.note { border:1px solid var(--line); background:white; border-radius:16px; padding:12px; margin-bottom:10px; }
.small { color:var(--muted); font-size:14px; }
@media (max-width:720px) {
  h1 { font-size:40px; }
  main { padding:14px; }
  .grid { grid-template-columns:1fr; }
  .big { font-size:32px; }
  .row { grid-template-columns:90px 1fr 76px; }
  .daycell { min-height:68px; padding:6px; }
}
</style>
</head>
<body>
<header>
  <h1>Jess Roster</h1>
  <p>Device date • 29 Jun 2025 to 31 Dec 2028 • 84-day cycle</p>
</header>
<main>
  <section class="grid">
    <div class="card"><div class="label">Today</div><div id="todayShift" class="big">—</div><div id="todayDate" class="small"></div></div>
    <div class="card"><div class="label">Next Shift</div><div id="nextShift" class="big">—</div><div id="nextDate" class="small"></div></div>
    <div class="card"><div class="label">Next Day Off</div><div id="nextOff" class="big">—</div><div id="nextOffDate" class="small"></div></div>
  </section>

  <input id="search" class="search" placeholder="Search date, shift, note...">

  <div class="datebar">
    <input id="jumpDate" type="date">
    <button onclick="jumpToToday()">Today</button>
  </div>

  <nav class="tabs">
    <button class="active" onclick="setView('list', this)">List</button>
    <button onclick="setView('week', this)">Week</button>
    <button onclick="setView('month', this)">Month</button>
    <button onclick="setView('notes', this)">Swaps / notes</button>
  </nav>

  <section id="content" class="card"></section>
</main>

function getShift(ymd) { return ROSTER_MAP.get(ymd)?.shift ?? ""; }
function noteKey(ymd) { return "jess_note_" + ymd; }
function getNote(ymd) { return localStorage.getItem(noteKey(ymd)) || ""; }
function saveNote(ymd, txt) { txt.trim() ? localStorage.setItem(noteKey(ymd), txt.trim()) : localStorage.removeItem(noteKey(ymd)); render(); }

function updateTop() {
  const today = melbourneTodayYMD();
  const todayShift = getShift(today);
  document.getElementById("todayShift").textContent = todayShift || "Not in roster";
  document.getElementById("todayDate").textContent = fmtDate(today, {weekday:"long", day:"2-digit", month:"short", year:"numeric"});
  let next = null;
  for (let i=1;i<900;i++) { const y = addDays(today, i); const s = getShift(y); if (isWorking(s)) { next = {date:y, shift:s}; break; } }
  document.getElementById("nextShift").textContent = next ? next.shift : "—";
  document.getElementById("nextDate").textContent = next ? fmtDate(next.date, {weekday:"short", day:"2-digit", month:"short", year:"numeric"}) : "";
  let off = null;
  for (let i=0;i<900;i++) { const y = addDays(today, i); const s = getShift(y); if (isDayOff(s)) { off = {date:y, shift:s, days:i}; break; } }
  document.getElementById("nextOff").textContent = off ? (off.days === 0 ? "Today" : `${off.days} day${off.days===1?"":"s"}`) : "—";
  document.getElementById("nextOffDate").textContent = off ? `${fmtDate(off.date, {weekday:"short", day:"2-digit", month:"short", year:"numeric"})} • ${off.shift}` : "";
}
function setView(v, btn) { view = v; document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active")); btn.classList.add("active"); render(); }
function jumpToToday() { selectedYMD = melbourneTodayYMD(); document.getElementById("jumpDate").value = selectedYMD; render(); }
function rowHTML(r) {
  const n = getNote(r.date);
  return `<div class="row"><div><div class="d">${fmtDate(r.date, {day:"2-digit", month:"short"})}</div><div class="w">${weekday(r.date,true)}</div></div><div><b>${fmtDate(r.date, {day:"2-digit", month:"long", year:"numeric"})}</b>${n ? `<div class="small">Note: ${escapeHTML(n)}</div>` : ""}</div><div class="pill ${shiftClass(r.shift)}">${r.shift || "—"}</div></div>`;
}
function renderList() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  let arr = ROSTER.filter(r => r.date >= addDays(selectedYMD, -7) && r.date <= addDays(selectedYMD, 60));
  if (q) arr = ROSTER.filter(r => `${r.date} ${fmtDate(r.date, {weekday:"long", day:"2-digit", month:"long", year:"numeric"})} ${r.shift} ${getNote(r.date)}`.toLowerCase().includes(q)).slice(0,200);
  return arr.length ? `<div class="rows">${arr.map(rowHTML).join("")}</div>` : "No matching roster rows.";
}
function renderWeek() {
  const dt = localDate(selectedYMD);
  const mondayOffset = (dt.getDay() + 6) % 7;
  const monday = ymdFromLocalDate(new Date(dt.getFullYear(), dt.getMonth(), dt.getDate() - mondayOffset, 12));
  const arr = Array.from({length:7}, (_,i)=> { const y = addDays(monday,i); return {date:y, shift:getShift(y)}; });
  return `<h2>Week of ${fmtDate(monday, {day:"2-digit", month:"long", year:"numeric"})}</h2><div class="rows">${arr.map(rowHTML).join("")}</div>`;
}
function renderMonth() {
  const {y,m} = partsFromYMD(selectedYMD);
  const first = new Date(y, m-1, 1, 12);
  const monthName = new Intl.DateTimeFormat("en-AU", {month:"long", year:"numeric"}).format(first);
  const firstDowMonday = (first.getDay() + 6) % 7;
  const gridStart = new Date(y, m-1, 1 - firstDowMonday, 12);
  const cells = [];
  for (let i=0;i<42;i++) {
    const dt = new Date(gridStart.getFullYear(), gridStart.getMonth(), gridStart.getDate()+i, 12);
    const ymd = ymdFromLocalDate(dt);
    const sh = getShift(ymd);
    const other = dt.getMonth() !== (m-1);
    const today = ymd === melbourneTodayYMD();
    cells.push(`<div class="daycell ${other?'other':''} ${today?'today':''}" onclick="selectedYMD='${ymd}';document.getElementById('jumpDate').value=selectedYMD;view='list';document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));document.querySelector('.tabs button').classList.add('active');render()"><div class="num">${dt.getDate()}</div><span class="shift ${shiftClass(sh)}">${sh || "—"}</span></div>`);
  }
  return `<div class="monthHead"><button onclick="selectedYMD=addMonth(selectedYMD,-1);document.getElementById('jumpDate').value=selectedYMD;render()">‹</button><h2>${monthName}</h2><button onclick="selectedYMD=addMonth(selectedYMD,1);document.getElementById('jumpDate').value=selectedYMD;render()">›</button></div><div class="monthGrid">${["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d=>`<div class="dow">${d}</div>`).join("")}${cells.join("")}</div>`;
}
function addMonth(ymd, n) { const {y,m,d} = partsFromYMD(ymd); return ymdFromLocalDate(new Date(y, m-1+n, Math.min(d,28), 12)); }
function renderNotes() {
  const sh = getShift(selectedYMD), n = getNote(selectedYMD);
  return `<h2>${fmtDate(selectedYMD, {weekday:"long", day:"2-digit", month:"long", year:"numeric"})} — ${sh || "—"}</h2><textarea id="noteBox" placeholder="Add swap, leave or note for this date...">${escapeHTML(n)}</textarea><div style="margin-top:10px"><button onclick="saveNote('${selectedYMD}', document.getElementById('noteBox').value)">Save note</button></div><h3>Saved notes</h3>${ROSTER.filter(r=>getNote(r.date)).map(r=>`<div class="note"><b>${fmtDate(r.date, {weekday:"short", day:"2-digit", month:"short", year:"numeric"})} — ${r.shift}</b><div>${escapeHTML(getNote(r.date))}</div></div>`).join("") || "<p>No saved notes yet.</p>"}`;
}
function escapeHTML(s) { return String(s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m])); }
function render() {
  document.getElementById("jumpDate").value = selectedYMD;
  updateTop();
  if (view === "list") content.innerHTML = renderList();
  if (view === "week") content.innerHTML = renderWeek();
  if (view === "month") content.innerHTML = renderMonth();
  if (view === "notes") content.innerHTML = renderNotes();
}
document.getElementById("jumpDate").addEventListener("change", e => { selectedYMD = e.target.value; render(); });
document.getElementById("search").addEventListener("input", render);
render();
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("./service-worker.js"));
}
</script>
</body>
</html>
