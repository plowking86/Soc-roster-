const longDate=d=>new Intl.DateTimeFormat('en-AU',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}).format(new Date(d+'T00:00:00'));
const iso=d=>d.toISOString().slice(0,10); const today=iso(new Date());

const byDate=Object.fromEntries(DATA.roster.map(x=>[x.date,x]));
function cls(s){s=(s||'').toUpperCase(); if(['BO','ADO','EDO','RDO'].includes(s))return'off'; if(s.includes('AL')||s.includes('LSL'))return'leave'; let h=parseInt(s); if(!isNaN(h)&&h<10)return'early'; if(!isNaN(h)&&h>=18)return'late'; return''}
function displayShift(item){let e=edits[item.date]||{}; return e.swap||item.shift}
function row(item){let e=edits[item.date]||{}; let sh=displayShift(item); return `<div class="row"><div><div class="date">${fmtDate(item.date)}</div><div class="dow">${item.date}</div></div><div><span class="pill ${cls(sh)}">${sh}</span>${e.swap?`<div class="swap">Original: ${item.shift}</div>`:''}${e.note?`<div class="note">${e.note}</div>`:''}</div><button class="light" onclick="openEdit('${item.date}')">Edit</button></div>`}
function renderList(){let q=document.getElementById('search').value.toLowerCase(); let start=document.getElementById('jump').value; let rows=DATA.roster.filter(x=>(!start||x.date>=start)); rows=rows.filter(x=>{let e=edits[x.date]||{}; return (x.date+' '+fmtDate(x.date)+' '+x.shift+' '+(e.swap||'')+' '+(e.note||'')).toLowerCase().includes(q)}).slice(0,90); document.getElementById('list').innerHTML=rows.map(row).join('')||'<p>No matching roster rows.</p>'}
function startOfWeek(d){let x=new Date(d+'T00:00:00'); x.setDate(x.getDate()-x.getDay()); return x}
function renderWeek(){let start=startOfWeek(document.getElementById('jump').value||today); let arr=[]; for(let i=0;i<7;i++){let d=new Date(start); d.setDate(start.getDate()+i); let k=iso(d); arr.push(byDate[k]||{date:k,shift:'—'})} document.getElementById('week').innerHTML=arr.map(row).join('')}
let monthCursor=new Date((DATA.roster.find(x=>x.date>=today)||DATA.roster[0]).date+'T00:00:00');
function renderMonth(){let y=monthCursor.getFullYear(), m=monthCursor.getMonth(); document.getElementById('monthTitle').textContent=new Intl.DateTimeFormat('en-AU',{month:'long',year:'numeric'}).format(monthCursor); let first=new Date(y,m,1); let pad=first.getDay(); let days=new Date(y,m+1,0).getDate(); let html=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(x=>`<div class="dayname">${x}</div>`).join(''); for(let i=0;i<pad;i++) html+='<div></div>'; for(let n=1;n<=days;n++){let k=iso(new Date(y,m,n)); let it=byDate[k]; let sh=it?displayShift(it):''; html+=`<div class="day ${k===today?'today':''}" onclick="${it?`openEdit('${k}')`:''}"><div class="n">${n}</div><div class="s"><span class="pill ${cls(sh)}">${sh||'—'}</span></div></div>`} document.getElementById('month').innerHTML=html}
function renderSwaps(){let rows=Object.keys(edits).sort().map(d=>byDate[d]).filter(Boolean); document.getElementById('swapsList').innerHTML=rows.map(row).join('')||'<p>No swaps or notes saved yet.</p>'}
function renderKPIs(){let t=byDate[today]; document.getElementById('todayShift').textContent=t?displayShift(t):'Not in roster'; let next=DATA.roster.find(x=>x.date>=today && !['BO','ADO','EDO','RDO','AL'].includes(displayShift(x).toUpperCase())); document.getElementById('nextShift').textContent=next?`${fmtDate(next.date)} ${displayShift(next)}`:'—'; document.getElementById('offLeft').textContent=DATA.roster.filter(x=>x.date>=today && ['BO','ADO','EDO','RDO'].includes(displayShift(x).toUpperCase())).length}
function renderAll(){renderList();renderWeek();renderMonth();renderSwaps();renderKPIs()}
function openEdit(d){selected=d; let it=byDate[d]; let e=edits[d]||{}; document.getElementById('editTitle').textContent=longDate(d)+' • '+it.shift; document.getElementById('swapInput').value=e.swap||''; document.getElementById('noteInput').value=e.note||''; document.getElementById('editDialog').showModal()}
window.openEdit=openEdit;
document.getElementById('saveEdit').onclick=()=>{edits[selected]={swap:document.getElementById('swapInput').value.trim(), note:document.getElementById('noteInput').value.trim()}; if(!edits[selected].swap&&!edits[selected].note) delete edits[selected]; localStorage.setItem(storeKey,JSON.stringify(edits)); document.getElementById('editDialog').close(); renderAll()};
document.getElementById('clearEdit').onclick=()=>{delete edits[selected]; localStorage.setItem(storeKey,JSON.stringify(edits)); document.getElementById('editDialog').close(); renderAll()};
document.getElementById('closeEdit').onclick=()=>document.getElementById('editDialog').close();
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active')); b.classList.add('active'); ['list','week','month','swaps'].forEach(v=>document.getElementById(v+'View').classList.toggle('hidden',v!==b.dataset.view)); renderAll()});
document.getElementById('search').oninput=renderList; document.getElementById('jump').onchange=renderAll; document.getElementById('todayBtn').onclick=()=>{document.getElementById('jump').value=today; monthCursor=new Date(today+'T00:00:00'); renderAll()};
document.getElementById('prevMonth').onclick=()=>{monthCursor.setMonth(monthCursor.getMonth()-1);renderMonth()}; document.getElementById('nextMonth').onclick=()=>{monthCursor.setMonth(monthCursor.getMonth()+1);renderMonth()};
document.getElementById('jump').value=(DATA.roster.find(x=>x.date>=today)||DATA.roster[0]).date; renderAll();
</script><script>if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("service-worker.js"));}</script>
