<!doctype html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#7c3aed">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Jess Roster">
<title>Jess Roster</title>
<style>
:root {
  --bg:#f6f3fa; --card:#fff; --ink:#11131a; --muted:#6b7280; --line:#e5e7eb;
  --purple:#7c3aed; --pink:#db2777;
}
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { -webkit-text-size-adjust:100%; }
body {
  margin:0; background:var(--bg); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  padding-bottom:env(safe-area-inset-bottom);
}
header {
  padding:calc(42px + env(safe-area-inset-top)) 22px 26px;
  color:white; background:linear-gradient(135deg,var(--purple),var(--pink));
}
h1 { margin:0; font-size:40px; letter-spacing:-1px; }
header p { margin:8px 0 0; font-size:16px; opacity:.92; font-weight:700; }
main { padding:14px; max-width:920px; margin:auto; }
.grid { display:grid; grid-template-columns:1fr; gap:12px; }
.card { background:var(--card); border:1px solid var(--line); border-radius:22px; padding:17px; box-shadow:0 2px 10px #00000012; }
.label { color:var(--muted); font-weight:800; font-size:16px; }
.big { font-size:34px; font-weight:900; margin-top:8px; line-height:1.05; min-height:38px; }
.small { color:var(--muted); font-size:14px; margin-top:5px; min-height:18px; }
.search { width:100%; padding:17px 18px; border:1px solid var(--line); border-radius:18px; font-size:18px; margin:14px 0; }
.datebar { display:flex; gap:10px; align-items:center; }
.datebar input { min-width:0; flex:1; padding:15px; border-radius:18px; border:1px solid var(--line); text-align:center; font-size:17px; }
button { border:0; border-radius:18px; padding:15px 17px; font-weight:900; background:#111827; color:white; cursor:pointer; font-size:16px; }
.tabs { display:flex; gap:9px; overflow:auto; margin:14px 0; padding-bottom:4px; }
.tabs button { white-space:nowrap; background:white; color:#111827; border:1px solid var(--line); box-shadow:0 2px 8px #0000000d; }
.tabs button.active { background:var(--purple); color:white; }
.rows { display:grid; gap:10px; }
.row { display:grid; grid-template-columns:88px 1fr 76px; gap:10px; align-items:center; padding:13px; border:1px solid var(--line); border-radius:18px; background:white; }
.row .d { font-weight:900; }
.row .w { color:var(--muted); font-weight:700; }
.pill { justify-self:end; min-width:72px; text-align:center; border-radius:999px; padding:9px 10px; font-weight:900; background:#eef2ff; }
.pill.off { background:#f3f4f6; color:#374151; }
.pill.day { background:#ccfbf1; color:#115e59; }
.pill.night { background:#e0e7ff; color:#312e81; }
.pill.leave { background:#fef3c7; color:#92400e; }
.pill.edo { background:#dbeafe; color:#1d4ed8; }
.monthHead { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; gap:10px; }
.monthHead h2 { margin:0; font-size:21px; text-align:center; }
.monthGrid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
.dow { text-align:center; font-size:12px; font-weight:900; color:var(--muted); }
.daycell { min-height:66px; background:white; border:1px solid var(--line); border-radius:14px; padding:6px; }
.daycell.other { opacity:.35; }
.daycell.today { outline:3px solid var(--purple); }
.num { font-weight:900; }
.shift { margin-top:5px; display:inline-block; font-weight:900; font-size:12px; border-radius:999px; padding:5px 6px; background:#eef2ff; }
textarea { width:100%; border:1px solid var(--line); border-radius:14px; padding:12px; min-height:90px; font-size:16px; }
.note { border:1px solid var(--line); background:white; border-radius:16px; padding:12px; margin-bottom:10px; }
.debug { margin-top:14px; padding:12px; border-radius:16px; background:#ffffff22; color:white; font-size:13px; font-weight:700; line-height:1.45; overflow-wrap:anywhere; }
@media (min-width:720px) {
  header { padding:56px 28px 34px; }
  h1 { font-size:44px; }
  main { padding:18px; }
  .grid { grid-template-columns:repeat(3,1fr); }
  .big { font-size:34px; }
  .daycell { min-height:78px; padding:8px; }
}
</style>
</head>

<header>

    <button data-view="month" type="button">Month</button>
    <button data-view="notes" type="button">Swaps / notes</button>

  <section id="content" class="card"></section>
</main>

const ROSTER_MAP = new Map(ROSTER.map(r => [r.date, r]));
let view = "list";
let selectedYMD = deviceTodayYMD();

const el = id => document.getElementById(id);

async function clearOldCaches() {
  try {
    if ("serviceWorker" in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const r of regs) await r.unregister();
    }
    if ("caches" in window) {
      const keys = await caches.keys();
      for (const k of keys) await caches.delete(k);
    }
  } catch (e) {}
}

function partsFromYMD(ymd) {
  const p = String(ymd).split("-").map(Number);
  return {y:p[0], m:p[1], d:p[2]};
}
function localDate(ymd) {
  const p = partsFromYMD(ymd);
  return new Date(p.y, p.m - 1, p.d, 12, 0, 0);
}
function ymdFromLocalDate(dt) {
  return dt.getFullYear() + "-" + String(dt.getMonth()+1).padStart(2,"0") + "-" + String(dt.getDate()).padStart(2,"0");
}
function addDays(ymd, days) {
  const dt = localDate(ymd);
  dt.setDate(dt.getDate() + days);
  return ymdFromLocalDate(dt);
}
function deviceTodayYMD() {
  const now = new Date();
  return now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0") + "-" + String(now.getDate()).padStart(2,"0");
}
function fmtDate(ymd, opts) {
  return new Intl.DateTimeFormat("en-AU", opts || {}).format(localDate(ymd));
}
function weekday(ymd, shortName) {
  return fmtDate(ymd, {weekday: shortName ? "short" : "long"});
}
function shiftClass(s) {
  if (!s) return "off";
  const u = String(s).toUpperCase();
  if (u === "BO" || u === "RDO") return "off";
  if (u.indexOf("AL") !== -1) return "leave";
  if (u.indexOf("EDO") !== -1) return "edo";
  if (/^(20|21|22|23):/.test(s)) return "night";
  return "day";
}
function isWorking(s) {
  if (!s) return false;
  const u = String(s).toUpperCase();
  return !(u === "BO" || u === "RDO" || u === "AL" || u === "EDO");
}
function isDayOff(s) {
  if (!s) return false;
  const u = String(s).toUpperCase();
  return u === "BO" || u === "RDO";
}
function getShift(ymd) {
  const row = ROSTER_MAP.get(ymd);
  return row ? row.shift : "";
}
function noteKey(ymd) { return "jess_note_" + ymd; }
function getNote(ymd) { return localStorage.getItem(noteKey(ymd)) || ""; }
function saveNote(ymd, txt) {
  if (txt.trim()) localStorage.setItem(noteKey(ymd), txt.trim());
  else localStorage.removeItem(noteKey(ymd));
  render();
}
function updateDebug() {
  const ymd = deviceTodayYMD();
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || "unknown";
  el("debugBox").textContent = "App " + APP_VERSION + " • Device today: " + ymd + " • Browser timezone: " + tz + " • Shift lookup: " + (getShift(ymd) || "missing");
}
function updateTop() {
  const today = deviceTodayYMD();
  const todayShift = getShift(today);
  el("todayShift").textContent = todayShift || "Not in roster";
  el("todayDate").textContent = fmtDate(today, {weekday:"long", day:"2-digit", month:"short", year:"numeric"});
  let next = null;
  for (let i=1;i<900;i++) {
    const y = addDays(today, i);
    const s = getShift(y);
    if (isWorking(s)) { next = {date:y, shift:s}; break; }
  }
  el("nextShift").textContent = next ? next.shift : "—";
  el("nextDate").textContent = next ? fmtDate(next.date, {weekday:"short", day:"2-digit", month:"short", year:"numeric"}) : "";
  let off = null;
  for (let i=0;i<900;i++) {
    const y = addDays(today, i);
    const s = getShift(y);
    if (isDayOff(s)) { off = {date:y, shift:s, days:i}; break; }
  }
  el("nextOff").textContent = off ? (off.days === 0 ? "Today" : off.days + " day" + (off.days === 1 ? "" : "s")) : "—";
  el("nextOffDate").textContent = off ? fmtDate(off.date, {weekday:"short", day:"2-digit", month:"short", year:"numeric"}) + " • " + off.shift : "";
  updateDebug();
}
function setView(v, btn) {
  view = v;
  document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  render();
}
function jumpToToday() {
  selectedYMD = deviceTodayYMD();
  el("jumpDate").value = selectedYMD;
  render();
}
function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]));
}
function rowHTML(r) {
  const n = getNote(r.date);
  return '<div class="row"><div><div class="d">' + fmtDate(r.date, {day:"2-digit", month:"short"}) + '</div><div class="w">' + weekday(r.date,true) + '</div></div><div><b>' + fmtDate(r.date, {day:"2-digit", month:"long", year:"numeric"}) + '</b>' + (n ? '<div class="small">Note: ' + escapeHTML(n) + '</div>' : '') + '</div><div class="pill ' + shiftClass(r.shift) + '">' + (r.shift || "—") + '</div></div>';
}
function renderList() {
  const q = el("search").value.trim().toLowerCase();
  let arr = ROSTER.filter(r => r.date >= addDays(selectedYMD, -7) && r.date <= addDays(selectedYMD, 60));
  if (q) {
    arr = ROSTER.filter(r => (r.date + " " + fmtDate(r.date, {weekday:"long", day:"2-digit", month:"long", year:"numeric"}) + " " + r.shift + " " + getNote(r.date)).toLowerCase().includes(q)).slice(0,200);
  }
  return arr.length ? '<div class="rows">' + arr.map(rowHTML).join("") + '</div>' : "No matching roster rows.";
}
function renderWeek() {
  const dt = localDate(selectedYMD);
  const mondayOffset = (dt.getDay() + 6) % 7;
  const monday = ymdFromLocalDate(new Date(dt.getFullYear(), dt.getMonth(), dt.getDate() - mondayOffset, 12));
  const arr = Array.from({length:7}, (_,i) => {
    const y = addDays(monday,i);
    return {date:y, shift:getShift(y)};
  });
  return '<h2>Week of ' + fmtDate(monday, {day:"2-digit", month:"long", year:"numeric"}) + '</h2><div class="rows">' + arr.map(rowHTML).join("") + '</div>';
}
function addMonth(ymd, n) {
  const p = partsFromYMD(ymd);
  return ymdFromLocalDate(new Date(p.y, p.m - 1 + n, Math.min(p.d,28), 12));
}
function renderMonth() {
  const p = partsFromYMD(selectedYMD);
  const first = new Date(p.y, p.m-1, 1, 12);
  const monthName = new Intl.DateTimeFormat("en-AU", {month:"long", year:"numeric"}).format(first);
  const firstDowMonday = (first.getDay() + 6) % 7;
  const gridStart = new Date(p.y, p.m-1, 1 - firstDowMonday, 12);
  let cells = "";
  for (let i=0;i<42;i++) {
    const dt = new Date(gridStart.getFullYear(), gridStart.getMonth(), gridStart.getDate()+i, 12);
    const ymd = ymdFromLocalDate(dt);
    const sh = getShift(ymd);
    const other = dt.getMonth() !== (p.m-1);
    const today = ymd === deviceTodayYMD();
    cells += '<div class="daycell ' + (other ? "other" : "") + ' ' + (today ? "today" : "") + '" data-day="' + ymd + '"><div class="num">' + dt.getDate() + '</div><span class="shift ' + shiftClass(sh) + '">' + (sh || "—") + '</span></div>';
  }
  return '<div class="monthHead"><button type="button" id="prevMonth">‹</button><h2>' + monthName + '</h2><button type="button" id="nextMonth">›</button></div><div class="monthGrid">' + ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d => '<div class="dow">' + d + '</div>').join("") + cells + '</div>';
}
function renderNotes() {
  const sh = getShift(selectedYMD), n = getNote(selectedYMD);
  const saved = ROSTER.filter(r => getNote(r.date)).map(r => '<div class="note"><b>' + fmtDate(r.date, {weekday:"short", day:"2-digit", month:"short", year:"numeric"}) + ' — ' + r.shift + '</b><div>' + escapeHTML(getNote(r.date)) + '</div></div>').join("") || "<p>No saved notes yet.</p>";
  return '<h2>' + fmtDate(selectedYMD, {weekday:"long", day:"2-digit", month:"long", year:"numeric"}) + ' — ' + (sh || "—") + '</h2><textarea id="noteBox" placeholder="Add swap, leave or note for this date...">' + escapeHTML(n) + '</textarea><div style="margin-top:10px"><button id="saveNoteBtn" type="button">Save note</button></div><h3>Saved notes</h3>' + saved;
}
function render() {
  el("jumpDate").value = selectedYMD;
  updateTop();
  const contentEl = el("content");
  if (view === "list") contentEl.innerHTML = renderList();
  if (view === "week") contentEl.innerHTML = renderWeek();
  if (view === "month") contentEl.innerHTML = renderMonth();
  if (view === "notes") contentEl.innerHTML = renderNotes();

  const prev = el("prevMonth");
  if (prev) prev.addEventListener("click", () => { selectedYMD = addMonth(selectedYMD,-1); render(); });
  const next = el("nextMonth");
  if (next) next.addEventListener("click", () => { selectedYMD = addMonth(selectedYMD,1); render(); });
  document.querySelectorAll("[data-day]").forEach(day => day.addEventListener("click", () => {
    selectedYMD = day.getAttribute("data-day");
    view = "list";
    document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
    document.querySelector('.tabs button[data-view="list"]').classList.add("active");
    render();
  }));
  const saveBtn = el("saveNoteBtn");
  if (saveBtn) saveBtn.addEventListener("click", () => saveNote(selectedYMD, el("noteBox").value));
}
document.addEventListener("DOMContentLoaded", () => {
  el("jumpDate").addEventListener("change", e => { selectedYMD = e.target.value; render(); });
  el("search").addEventListener("input", render);
  el("todayButton").addEventListener("click", jumpToToday);
  document.querySelectorAll(".tabs button").forEach(btn => btn.addEventListener("click", () => setView(btn.getAttribute("data-view"), btn)));
  render();

  // Clean old PWA/service-worker cache AFTER the app has rendered.
  // Do not await this on iPhone Safari or the whole app can stall.
  clearOldCaches();
});
